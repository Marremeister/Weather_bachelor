services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seabreeze}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/seabreeze}
      APP_ENV: ${APP_ENV:-development}
      WEATHER_CACHE_DIR: /data/cache
      GRIB_CACHE_DIR: /data/grib_cache
    volumes:
      - ./backend:/app
      - ./data:/data
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5175:5173"
    environment:
      VITE_API_TARGET: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  # Production-like single-container build (local testing only)
  # Usage: docker compose --profile prod up --build postgres app
  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/seabreeze}
      APP_ENV: ${APP_ENV:-production}
      WEATHER_CACHE_DIR: /tmp/cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  frontend_node_modules:
